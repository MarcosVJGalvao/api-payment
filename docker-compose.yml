services:
  api-payments:
    image: ghcr.io/marcosvjgalvao/api-payments:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - redis
    expose:
      - "${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend_net
    restart: unless-stopped

  nginx:
    image: ghcr.io/marcosvjgalvao/nginx:latest
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    depends_on:
      - api-payments
    env_file:
      - .env
    ports:
      - "${HOST_HTTP_PORT:-8080}:80"
    networks:
      - backend_net
      - edge_net
    restart: unless-stopped

  ngrok:
    image: ghcr.io/marcosvjgalvao/ngrok:latest
    build:
      context: .
      dockerfile: docker/ngrok.Dockerfile
    depends_on:
      - nginx
    env_file:
      - .env
    networks:
      - edge_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "no"
      - --maxmemory
      - "${REDIS_MAX_MEMORY:-128mb}"
      - --maxmemory-policy
      - "${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}"
      - --requirepass
      - "${REDIS_PASSWORD:-redispass}"
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD:-redispass}"
    networks:
      - backend_net
    restart: unless-stopped

networks:
  backend_net:
    name: api_payments_backend_net
    driver: bridge
  edge_net:
    name: api_payments_edge_net
    driver: bridge
